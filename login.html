
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ouvidoria DW</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
    --primary-color: #1b5e20;
    --primary-light: #2e7d32;
    --accent-color: #fb8c00;
    --accent-hover: #ef6c00;
}

/* Fundo mais suave */
body {
    background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #f8f9fa 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
}

/* Card */
.login-card {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease;
}

/* Título com detalhe laranja */
.login-title {
    text-align: center;
    margin-bottom: 25px;
    color: var(--primary-color);
    font-weight: bold;
}

.login-title::after {
    content: '';
    display: block;
    width: 50px;
    height: 3px;
    background: var(--accent-color);
    margin: 8px auto 0;
}

/* Inputs */
.form-control:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 5px rgba(251,140,0,0.4);
}

/* BOTÃO PRINCIPAL AGORA LARANJA */
.btn-login {
    background-color: var(--accent-color);
    color: white;
    border-radius: 30px;
    font-weight: bold;
}

.btn-login:hover {
    background-color: var(--accent-hover);
}

/* Links */
.links {
    margin-top: 20px;
    text-align: center;
}

.links a {
    display: block;
    text-align: center;
    margin: 5px 0;
    font-size: 0.95rem;
}

.links a:hover {
    color: var(--accent-color);
}

/* Erro */
.erro {
    color: red;
    font-size: 0.9rem;
    margin-top: 10px;
    display: none;
    text-align: center;
}

/* Animação */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="login-title">OUVIDORIA DW</h3>

        <form id="formLogin" action="verificar.php" method="POST">
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn btn-login w-100">Entrar</button>

            <div class="erro" id="erroMsg">
                Credenciais inválidas ou conta não existente
            </div>

            <div class="links">
                <a href="#">Esqueci minha senha</a>
                <a href="#">Criar nova conta</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("formLogin").addEventListener("submit", function(e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            // Simulação de login (você vai trocar isso pelo backend depois)
            if(email === "admin@email.com" && senha === "1234") {
                alert("Login realizado com sucesso!");
            } else {
                document.getElementById("erroMsg").style.display = "block";
            }
        });
    </script>

</body>
</html>
