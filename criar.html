
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Ouvidoria DW</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #1b5e20;
            --primary-light: #2e7d32;
            --accent-color: #fb8c00;
            --accent-hover: #ef6c00;
        }

        body {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #f8f9fa 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .cadastro-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease;
        }

        .titulo {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .titulo::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--accent-color);
            margin: 8px auto 0;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(251,140,0,0.4);
        }

        .btn-cadastrar {
            background-color: var(--accent-color);
            color: white;
            border-radius: 30px;
            font-weight: bold;
        }

        .btn-cadastrar:hover {
            background-color: var(--accent-hover);
        }

        .erro {
            color: red;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .links {
            margin-top: 15px;
            text-align: center;
        }

        .links a {
            display: block;
            color: #666;
            text-decoration: none;
            margin-top: 5px;
            transition: 0.3s;
        }

        .links a:hover {
            color: var(--accent-color);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

    <div class="cadastro-card">
        <h3 class="titulo">Criar Conta</h3>

        <form id="formCadastro">
            <div class="mb-3">
                <input type="text" class="form-control" id="usuario" placeholder="Nome de usuário" required>
            </div>

            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn btn-cadastrar w-100">Criar Conta</button>

            <div class="erro" id="erroMsg">
                Erro ao cadastrar. Tente novamente.
            </div>

            <div class="links">
                <a href="login.html">Já tem conta? Entrar</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("formCadastro").addEventListener("submit", function(e) {
            e.preventDefault();

            // Simulação (depois você liga com PHP)
            alert("Conta criada com sucesso!");
            
            // redireciona pro login
            window.location.href = "login.html";
        });
    </script>

</body>
</html>
